<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Learning — BookBot</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0c0e14;
    --surface:   #13161f;
    --surface2:  #1c2030;
    --border:    #252a3a;
    --accent:    #4f8ef7;
    --accent2:   #7c5af7;
    --green:     #34d399;
    --red:       #f87171;
    --text:      #e8ecf4;
    --muted:     #6b7591;
    --radius:    14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: 60px 1fr;
    overflow: hidden;
  }
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 16px;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  header span { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); margin-left: auto;
    transition: background .3s;
  }
  .status-dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 20px;
    overflow-y: auto;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(79,142,247,.05); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-zone p { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .upload-zone strong { color: var(--text); font-size: 13px; }
  #upload-status {
    font-size: 12px;
    color: var(--muted);
    display: none;
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    line-height: 1.6;
  }
  #upload-status.visible { display: block; }
  #upload-status.success { color: var(--green); }
  #upload-status.error   { color: var(--red); }
  .book-list { display: flex; flex-direction: column; gap: 6px; }
  .book-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all .15s;
    font-size: 13px;
  }
  .book-item:hover   { background: var(--surface2); }
  .book-item.active  { background: rgba(79,142,247,.12); border-color: rgba(79,142,247,.3); }
  .book-item .icon   { font-size: 18px; flex-shrink: 0; }
  .book-item .name   { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .book-item .id     { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .no-books          { font-size: 12px; color: var(--muted); text-align: center; padding: 12px; }
  .delete-btn {
    color: var(--muted);
    font-size: 15px;
    padding: 4px 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: var(--red); background: rgba(248,113,113,.1); }
  main {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .chat-header h2 { font-size: 15px; font-weight: 600; }
  .chat-header p  { font-size: 12px; color: var(--muted); }
  .book-badge {
    margin-left: auto;
    background: rgba(79,142,247,.15);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,.3);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: none;
  }
  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    transition: all .15s;
    font-family: 'Sora', sans-serif;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3   { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty-state p    { font-size: 13px; line-height: 1.6; max-width: 280px; text-align: center; }
  .msg {
    display: flex;
    gap: 10px;
    max-width: 80%;
    animation: fadeUp .25s ease;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg .avatar {
    width: 30px; height: 30px; border-radius: 8px;
    display: grid; place-items: center;
    font-size: 14px; flex-shrink: 0;
    background: var(--surface2);
  }
  .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, rgba(79,142,247,.18), rgba(124,90,247,.12));
    border-color: rgba(79,142,247,.25);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .typing { display: flex; gap: 4px; padding: 6px 0; align-items: center; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: bounce .8s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); opacity: .4; }
    50%      { transform: translateY(-5px); opacity: 1; }
  }
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    display: flex; align-items: center;
    padding: 0 14px;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  #question {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Sora', sans-serif;
    font-size: 14px; padding: 14px 0;
    resize: none; max-height: 120px;
  }
  #question::placeholder { color: var(--muted); }
  #send-btn {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; font-size: 18px;
    cursor: pointer; display: grid; place-items: center;
    transition: opacity .2s, transform .1s;
  }
  #send-btn:hover { opacity: .9; transform: scale(1.05); }
  #send-btn:active { transform: scale(.97); }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<header>
  <div class="logo">📖</div>
  <h1>Creative Learning <span>BookBot</span></h1>
  <div class="status-dot" id="status-dot" title="Server status"></div>
</header>

<aside>
  <div>
    <div class="section-label">Upload Book</div>
    <div class="upload-zone">
      <input type="file" accept=".pdf" id="file-input">
      <div class="upload-icon">📄</div>
      <strong>Drop PDF here</strong>
      <p>or click to browse files</p>
    </div>
    <div id="upload-status"></div>
  </div>
  <div>
    <div class="section-label">Your Library</div>
    <div class="book-list" id="book-list">
      <p class="no-books">No books found.<br>Upload a PDF to get started.</p>
    </div>
  </div>
</aside>

<main>
  <div class="chat-header">
    <div>
      <h2>Ask Your Book</h2>
      <p>Select a book and start asking questions</p>
    </div>
    <div class="book-badge" id="book-badge">—</div>
  </div>

  <div class="quick-btns">
    <button class="quick-btn" onclick="fillQ(this)">Summarize this chapter</button>
    <button class="quick-btn" onclick="fillQ(this)">Explain this concept</button>
    <button class="quick-btn" onclick="fillQ(this)">Give me examples</button>
    <button class="quick-btn" onclick="fillQ(this)">What are the key points?</button>
  </div>

  <div id="messages">
    <div class="empty-state">
      <div class="big">🤖</div>
      <h3>AI Tutor Ready</h3>
      <p>Upload a PDF from the sidebar, select your book, and start asking questions.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="question" rows="1" placeholder="Ask anything about your book..."></textarea>
    </div>
    <button id="send-btn" title="Send (Enter)" onclick="sendQuestion()">➤</button>
  </div>
</main>

<script>
const API = '';
let selectedBook = null;
let chatHistory  = [];

function showStatus(msg, type = '') {
  const el = document.getElementById('upload-status');
  el.textContent = msg;
  el.className = 'visible ' + type;
}
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}
function fillQ(el) {
  document.getElementById('question').value = el.textContent;
  document.getElementById('question').focus();
}

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  showStatus(`Processing "${file.name}"...`);
  const form = new FormData();
  form.append('file', file);
  try {
    const res  = await fetch(`${API}/upload`, { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');
    showStatus(`✓ ${data.total_chunks} chunks indexed successfully.`, 'success');
    loadBooks();
  } catch (err) {
    showStatus(`Error: ${err.message}`, 'error');
  }
  e.target.value = '';
});

async function loadBooks() {
  try {
    const res  = await fetch(`${API}/books`);
    const list = await res.json();
    const container = document.getElementById('book-list');
    if (!list.length) {
      container.innerHTML = '<p class="no-books">No books found.<br>Upload a PDF to get started.</p>';
      return;
    }
    container.innerHTML = list.map(b => `
      <div class="book-item ${selectedBook?.book_id === b.book_id ? 'active' : ''}"
           data-book='${JSON.stringify(b).replace(/'/g, "&apos;")}'
           onclick="selectBook(this)">
        <span class="icon">📚</span>
        <div style="flex:1;min-width:0">
          <div class="name">${b.book_name}</div>
          <div class="id">ID: ${b.book_id}</div>
        </div>
        <span class="delete-btn" onclick="deleteBook(event,'${b.book_id}')" title="Remove book">🗑</span>
      </div>
    `).join('');
  } catch {}
}

function selectBook(el) {
  const book   = JSON.parse(el.getAttribute('data-book').replace(/&apos;/g, "'"));
  selectedBook = book;
  chatHistory  = [];
  document.getElementById('book-badge').textContent = `📚 ${book.book_name}`;
  document.getElementById('book-badge').style.display = 'block';
  document.getElementById('messages').innerHTML = '';
  loadBooks();
  document.getElementById('question').focus();
}

async function deleteBook(e, bookId) {
  e.stopPropagation();
  if (!confirm('Remove this book from your library?')) return;
  try {
    await fetch(`${API}/books/${bookId}`, { method: 'DELETE' });
    if (selectedBook?.book_id === bookId) {
      selectedBook = null;
      chatHistory  = [];
      document.getElementById('book-badge').style.display = 'none';
      document.getElementById('messages').innerHTML = `
        <div class="empty-state">
          <div class="big">🤖</div>
          <h3>AI Tutor Ready</h3>
          <p>Upload a PDF from the sidebar, select your book, and start asking questions.</p>
        </div>`;
    }
    loadBooks();
  } catch {
    alert('Failed to remove book. Please try again.');
  }
}

document.getElementById('question').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});
document.getElementById('question').addEventListener('input', function() { autoGrow(this); });

function addMsg(role, content, streaming = false) {
  const msgs    = document.getElementById('messages');
  const el      = document.createElement('div');
  el.className  = `msg ${role}`;
  const bubbleId = 'bubble-' + Date.now();
  el.innerHTML = `
    <div class="avatar">${role === 'user' ? '🧑‍🎓' : '🤖'}</div>
    <div class="bubble" id="${bubbleId}">${streaming
      ? '<div class="typing"><span></span><span></span><span></span></div>'
      : escHtml(content)}</div>
  `;
  msgs.appendChild(el);
  scrollBottom();
  return bubbleId;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendQuestion() {
  if (!selectedBook) { alert('Please select a book from the sidebar first.'); return; }
  const input    = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';
  autoGrow(input);
  document.getElementById('send-btn').disabled = true;
  addMsg('user', question);
  chatHistory.push({ role: 'user', content: question });
  const bubbleId = addMsg('assistant', '', true);
  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, book_id: selectedBook.book_id, history: chatHistory.slice(0,-1) }),
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Server error'); }
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   full    = '';
    const bubble  = document.getElementById(bubbleId);
    bubble.innerHTML = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      full += decoder.decode(value, { stream: true });
      bubble.textContent = full;
      scrollBottom();
    }
    chatHistory.push({ role: 'assistant', content: full });
  } catch (err) {
    document.getElementById(bubbleId).innerHTML = `<span style="color:var(--red)">Error: ${escHtml(err.message)}</span>`;
  }
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

async function checkHealth() {
  try {
    const res = await fetch(`${API}/health`);
    if (res.ok) document.getElementById('status-dot').className = 'status-dot ready';
  } catch {}
}

checkHealth();
loadBooks();
</script>
</body>
</html>
